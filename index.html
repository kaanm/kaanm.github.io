<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaan Menekşedağ - Dosyalarım</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { text-align: center; margin: 30px 0; color: #1a1a1a; font-size: 2.5em; }
        .category { margin-bottom: 40px; }
        .category h2 { color: #2c3e50; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 3px solid #3498db; }
        .file-item { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .file-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .file-name { font-size: 1.2em; color: #333; font-weight: 600; }
        .btn { padding: 8px 16px; background: #3498db; color: white; text-decoration: none; border-radius: 5px; font-size: 0.9em; }
        .btn:hover { background: #2980b9; }
        .btn-pdf { background: #e74c3c; }
        .btn-pdf:hover { background: #c0392b; }
        .btn-pptx { background: #f39c12; }
        .btn-pptx:hover { background: #d68910; }
        .btn-mp4 { background: #27ae60; }
        .btn-mp4:hover { background: #1e8449; }
        iframe { width: 100%; height: 600px; border: 1px solid #ddd; border-radius: 5px; }
        video { width: 100%; max-width: 800px; margin: 20px auto; display: block; border-radius: 8px; }
        .info { color: #666; font-size: 0.9em; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="wrapper">
    <!-- SOL MENÜ (SIDEBAR) -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>📑 İçindekiler</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="#pdf-section" class="nav-link active">
                <span class="nav-icon">📄</span>
                <span class="nav-text">PDF Belgeleri</span>
            </a>
            <a href="#pptx-section" class="nav-link">
                <span class="nav-icon"></span>
                <span class="nav-text">Sunumlar</span>
            </a>
            <a href="#mp4-section" class="nav-link">
                <span class="nav-icon">🎥</span>
                <span class="nav-text">Videolar</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <p style="font-size: 0.85em; color: #666; text-align: center;">
                Kaan Menekşedağ<br>
                2026
            </p>
        </div>
    </aside>

    <!-- ANA İÇERİK -->
    <main class="main-content">
        <h1> Dosyalarım ve Çalışmalarım</h1>

        <!-- PDF BÖLÜMÜ -->
        <section id="pdf-section" class="category">
            <h2> PDF Belgeleri</h2>
            <div id="pdf-container"></div>
        </section>

        <!-- PPTX BÖLÜMÜ -->
        <section id="pptx-section" class="category">
            <h2> Sunumlar (PowerPoint)</h2>
            <div id="pptx-container"></div>
        </section>

        <!-- MP4 BÖLÜMÜ -->
        <section id="mp4-section" class="category">
            <h2>🎥 Videolar</h2>
            <div id="mp4-container"></div>
        </section>
    </main>
</div>
<script>
// ===== DOSYA LİSTELERİ (GitHub'daki TAM dosya isimlerini yazın) =====
const pdfFiles = [
    "The_Thesis2.pdf",
    "ParCFD2019_Extended_Abstract.pdf",
    "COMBINED RADIATION AND CONDUCTION HEAT TRANSFER SOLVER ON HYBRID CPU-GPU ARCHITECTURES.pdf",    
    "SEGREGATED APPROACH FOR THE MODELING OF CONTINUOUS HEAT TREATMENT FURNACES.pdf",
    "RAY TRACING ON GRAPHIC PROCESSORS.pdf",
    
];

const pptxFiles = [
    "ParCFD2019.pptx",
    "33rd_Sisecam_Glass_Symposium_BASOL.pptx"
    
];

const mp4Files = [
    {
        file: "ODTÜ Final Project-Garbage Collector.mp4",
        description: "ODTÜ EEE Bitirme Projesi - Çöp Toplayıcı Robot Simülasyonu. Otonom çöp toplama sistemi ve görüntü işleme algoritmaları kullanılarak geliştirilmiştir.<br>" +
          "Tepedeki webcam ile MATLAB 2015b üzerinde gerçek zamanlı veri işleme ile alandaki kırmızı çöpleri duvarın arkasına atarak alanı her an temiz kalmasını amaçladık.<br>" +
          "Bütçe 30 USD (laptop hariç). Her çöp duvardan en fazla 5 cm dışarıya atılmalı ve çizgilerden asla çöp dışarıya yanlışlıkla itilmemeli. "  
    }
];

    
  
// PDF'leri otomatik listele ve göster
const pdfContainer = document.getElementById('pdf-container');
pdfFiles.forEach((file, index) => {
    const fileName = file.replace('.pdf', '').replace(/_/g, ' ');
    const encodedFile = encodeURI(file);  // 🔑 BOŞLUKLARI DÜZELTİR
    const div = document.createElement('div');
    div.className = 'file-item';
    div.innerHTML = `
        <div class="file-header">
            <span class="file-name">📄 ${fileName}</span>
            <a href="${encodedFile}" class="btn btn-pdf" download>📥 PDF İndir</a>
        </div>
        <p class="info">PDF önizlemesi aşağıda görüntüleniyor...</p>
        <iframe src="${encodedFile}#toolbar=0" title="PDF ${index + 1}"></iframe>
    `;
    pdfContainer.appendChild(div);
});

// PPTX dosyalarını listele ve ÖNİZLEME ile göster
const pptxContainer = document.getElementById('pptx-container');
pptxFiles.forEach((file, index) => {
    const fileName = file.replace('.pptx', '').replace(/_/g, ' ');
    const encodedFile = encodeURI(file);
    const githubUrl = `https://kaanm.github.io/${encodedFile}`;
    const officeViewerUrl = `https://view.officeapps.live.com/op/embed.aspx?src=${encodeURIComponent(githubUrl)}`;
    
    const div = document.createElement('div');
    div.className = 'file-item';
    div.innerHTML = `
        <div class="file-header">
            <span class="file-name">📊 ${fileName}</span>
            <a href="${encodedFile}" class="btn btn-pptx" download>📥 Sunumu İndir</a>
        </div>
        <p class="info">Sunum önizlemesi aşağıda görüntüleniyor...</p>
        <iframe src="${officeViewerUrl}" width="100%" height="600px" frameborder="0" style="border: 1px solid #ddd; border-radius: 5px;"></iframe>
    `;
    pptxContainer.appendChild(div);
});

// MP4 dosyalarını listele ve oynat - AÇIKLAMA VİDEODAN ÖNCE
const mp4Container = document.getElementById('mp4-container');
mp4Files.forEach(item => {
    const fileName = item.file.replace('.mp4', '').replace(/_/g, ' ');
    const encodedFile = encodeURI(item.file);
    const div = document.createElement('div');
    div.className = 'file-item';
    div.innerHTML = `
        <div class="file-header">
            <span class="file-name">🎥 ${fileName}</span>
            <a href="${encodedFile}" class="btn btn-mp4" download>📥 Video İndir</a>
        </div>
        <p class="info" style="margin-bottom: 15px; padding: 10px; background: #f8f9fa; border-left: 3px solid #27ae60; border-radius: 3px;">
            <strong>📋 Açıklama:</strong> ${item.description}
        </p>
        <video controls>
            <source src="${encodedFile}" type="video/mp4">
            Tarayıcınız video etiketini desteklemiyor.
        </video>
    `;
    mp4Container.appendChild(div);
});

    </script>
</body>
</html>
