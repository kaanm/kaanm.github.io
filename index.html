<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaan Menekşedağ - Dosyalarım</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { text-align: center; margin: 30px 0; color: #1a1a1a; font-size: 2.5em; }
        .category { margin-bottom: 40px; }
        .category h2 { color: #2c3e50; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 3px solid #3498db; }
        .file-item { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .file-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .file-name { font-size: 1.2em; color: #333; font-weight: 600; }
        .btn { padding: 8px 16px; background: #3498db; color: white; text-decoration: none; border-radius: 5px; font-size: 0.9em; }
        .btn:hover { background: #2980b9; }
        .btn-pdf { background: #e74c3c; }
        .btn-pdf:hover { background: #c0392b; }
        .btn-pptx { background: #f39c12; }
        .btn-pptx:hover { background: #d68910; }
        .btn-mp4 { background: #27ae60; }
        .btn-mp4:hover { background: #1e8449; }
        iframe { width: 100%; height: 600px; border: 1px solid #ddd; border-radius: 5px; }
        video { width: 100%; max-width: 800px; margin: 20px auto; display: block; border-radius: 8px; }
        .info { color: #666; font-size: 0.9em; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📁 Dosyalarım</h1>

        <!-- PDF DOSYALARI - Otomatik iframe ile -->
        <div class="category">
            <h2>📄 PDF Belgeleri</h2>
            <div id="pdf-container"></div>
        </div>

        <!-- PPTX DOSYALARI -->
        <div class="category">
            <h2> Sunumlar</h2>
            <div id="pptx-container"></div>
        </div>

        <!-- MP4 DOSYALARI -->
        <div class="category">
            <h2> Videolar</h2>
            <div id="mp4-container"></div>
        </div>
    </div>
<script>
// ===== DOSYA LİSTELERİ (GitHub'daki TAM dosya isimlerini yazın) =====
const pdfFiles = [
    "The_Thesis2.pdf",
    "ParCFD2019_Extended_Abstract.pdf",
    "COMBINED RADIATION AND CONDUCTION HEAT TRANSFER SOLVER ON HYBRID CPU-GPU ARCHITECTURES.pdf",    
    "SEGREGATED APPROACH FOR THE MODELING OF CONTINUOUS HEAT TREATMENT FURNACES.pdf",
    "RAY TRACING ON GRAPHIC PROCESSORS.pdf",
    
];

const pptxFiles = [
    "ParCFD2019.pptx",
    "33rd_Sisecam_Glass_Symposium_BASOL.pptx"
    
];

const mp4Files = [
    {
        "ODTÜ Final Proje-Garbage Collector.mp4",

    }
];

    
  
// PDF'leri otomatik listele ve göster
const pdfContainer = document.getElementById('pdf-container');
pdfFiles.forEach((file, index) => {
    const fileName = file.replace('.pdf', '').replace(/_/g, ' ');
    const encodedFile = encodeURI(file);  // 🔑 BOŞLUKLARI DÜZELTİR
    const div = document.createElement('div');
    div.className = 'file-item';
    div.innerHTML = `
        <div class="file-header">
            <span class="file-name">📄 ${fileName}</span>
            <a href="${encodedFile}" class="btn btn-pdf" download>📥 PDF İndir</a>
        </div>
        <p class="info">PDF önizlemesi aşağıda görüntüleniyor...</p>
        <iframe src="${encodedFile}#toolbar=0" title="PDF ${index + 1}"></iframe>
    `;
    pdfContainer.appendChild(div);
});

// PPTX dosyalarını listele
const pptxContainer = document.getElementById('pptx-container');
pptxFiles.forEach(file => {
    const fileName = file.replace('.pptx', '').replace(/_/g, ' ');
    const encodedFile = encodeURI(file);  // 🔑
    const div = document.createElement('div');
    div.className = 'file-item';
    div.innerHTML = `
        <div class="file-header">
            <span class="file-name"> ${fileName}</span>
            <a href="${encodedFile}" class="btn btn-pptx" download>📥 Sunumu İndir</a>
        </div>
        <p class="info">💡 PowerPoint dosyaları tarayıcıda doğrudan görüntülenemez. İndirip bilgisayarınızda açabilirsiniz.</p>
    `;
    pptxContainer.appendChild(div);
});

// MP4 dosyalarını listele ve oynat
const mp4Container = document.getElementById('mp4-container');
mp4Files.forEach(file => {
    const fileName = file.replace('.mp4', '').replace(/_/g, ' ');
    const encodedFile = encodeURI(file);  // 🔑
    const div = document.createElement('div');
    div.className = 'file-item';
    div.innerHTML = `
        <div class="file-header">
            <span class="file-name"> ${fileName}</span>
            <a href="${encodedFile}" class="btn btn-mp4" download>📥 Video İndir</a>
        </div>
        <video controls>
            <source src="${encodedFile}" type="video/mp4">
            Tarayıcınız video etiketini desteklemiyor.
        </video>
    `;
    mp4Container.appendChild(div);
});
    </script>
</body>
</html>
